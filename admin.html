<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #f48024;
  --primary-dark: #d35400;
  --secondary: #6ab04c;
  --dark: #2c3e50;
  --bg: #fdf8e4; /* Cream background */
  --card-bg: #fff;
  --border: #f1ebd8;
  --success: #6ab04c;
  --danger: #e74c3c;
  --warning: #f48024;
}

body { 
  font-family: 'Outfit', sans-serif; 
  background: var(--bg); 
  margin: 0; 
  padding: 0; 
  color: var(--dark);
}

header { 
  background: var(--card-bg); 
  padding: 0; 
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 3px solid var(--primary);
  display: flex;
  align-items: center;
}

.header-banner {
  width: 100%;
  height: auto;
  display: block;
}

.action-bar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 15px 20px 0 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.action-bar b {
  color: var(--dark);
  font-size: 1.1rem;
  margin-right: 15px;
}

.logout { 
  background: var(--dark); 
  color: white; 
  border: none; 
  padding: 8px 16px; 
  border-radius: 6px;
  cursor: pointer; 
  font-weight: 600;
  transition: 0.3s;
  font-family: 'Outfit', sans-serif;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.logout:hover { background: #1a252f; transform: translateY(-2px); }

.container {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

.stats-card {
  background: var(--card-bg);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  border-left: 5px solid var(--primary);
  color: var(--dark);
}

.stats-card span {
  color: var(--primary-dark);
  margin-left: 10px;
  font-size: 1.5rem;
}

.btn-upload {
  width: 100%;
  padding: 15px;
  background: var(--secondary);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1.1rem;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(106, 176, 76, 0.3);
  font-family: inherit;
  margin-bottom: 20px;
}

.btn-upload:hover {
  background: #509e35;
  transform: translateY(-2px);
}

#uploadPanel {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 25px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

#studentSelect { max-height:200px; overflow-y:auto; border:1px solid #ccc; padding:10px; margin-top:10px; border-radius: 6px; background: white; }
#studentSelect label { display: block; padding: 6px 0; border-bottom: 1px solid #f1f1f1; cursor: pointer; }
#studentSelect label:last-child { border-bottom: none; }
#studentSelect input { margin-right: 10px; }

.btn-action {
  background: var(--warning);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}

.search-box {
  width: 100%;
  padding: 15px;
  border: 2px solid #ccc;
  border-radius: 10px;
  font-size: 1rem;
  font-family: inherit;
  box-sizing: border-box;
  margin-bottom: 20px;
  transition: 0.3s;
}

.search-box:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(244, 128, 36, 0.15);
}

.student-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: flex-start;
}

.student-card {
  display: flex;
  background: var(--card-bg);
  border: 2px solid var(--secondary);
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  max-width: 100%;
}

.sc-header-labels {
  display: flex;
  background: transparent;
  margin-bottom: -1px;
}
.label-tab {
  border: 1px solid var(--dark);
  border-bottom: none;
  background: var(--card-bg);
  padding: 4px 10px;
  font-size: 0.9rem;
  font-weight: 600;
  text-align: center;
}
.sr-col {
  width: 60px;
  border-right: 1px solid var(--dark);
  display: flex;
  flex-direction: column;
}
.sr-label {
  border-bottom: 1px solid var(--dark);
  padding: 5px;
  text-align: center;
  font-weight: bold;
  background: #fdfdfd;
}
.sr-num {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  font-weight: bold;
}
.prof-col {
  width: 120px;
  border-right: 1px solid var(--dark);
  display: flex;
  flex-direction: column;
  align-items: center;
}
.prof-label {
  border-bottom: 1px solid var(--dark);
  padding: 5px;
  text-align: center;
  font-weight: bold;
  width: 100%;
  background: #fdfdfd;
  box-sizing: border-box;
}
.prof-body {
  padding: 10px;
  text-align: center;
}
.child-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-bottom: 5px; background: #3498db; }
.id-box { 
  background: #f1f2f6; 
  font-size: 13px; 
  padding: 4px 8px; 
  border-radius: 4px;
  display: inline-block; 
  cursor:pointer; 
  font-weight: 600;
  color: var(--dark);
  border: 1px solid #ccc;
}

.det-col {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.det-label {
  border-bottom: 1px solid var(--dark);
  padding: 5px;
  text-align: center;
  font-weight: bold;
  background: #fdfdfd;
}
.det-body {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.name-box {
  border: 1px solid var(--dark);
  padding: 8px 12px;
  font-size: 1.1rem;
  font-weight: bold;
  background: #eee;
  color: var(--dark);
}
.pay-row {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-wrap: wrap;
}
.pay-input {
  border: 1px solid var(--dark);
  padding: 6px;
  font-family: inherit;
}
.btn {
  padding: 6px 12px;
  font-weight: bold;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  color: white;
  border: 1px solid var(--dark);
}
.btn-save { background: var(--success); }
.btn-clear { background: #7f8c8d; }
.btn-edit { background: #3498db; }
.btn-del { background: #95a5a6; }
.act-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

@media (max-width: 768px) {
  .student-card {
    flex-direction: row;
    font-size: 0.85rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .sr-col { min-width: 40px; }
  .prof-col { min-width: 85px; }
  .det-col { min-width: 300px; } /* Reduced from 350px to fit better */
  .child-photo { width: 45px; height: 45px; }
  .btn { font-size: 0.75rem; padding: 4px 6px; }
  .name-box { padding: 6px 10px; font-size: 1rem; }
  .pay-input { padding: 4px; font-size: 0.8rem; }
}

/* Attendance Button Styles */
.btn-pres { 
  background: #fff; 
  color: var(--success); 
  border: 1.5px solid var(--success) !important;
  opacity: 0.7;
}
.btn-pres.active { 
  background: var(--success) !important; 
  color: #fff !important; 
  opacity: 1;
  box-shadow: 0 2px 8px rgba(106, 176, 76, 0.4);
}

.btn-abs { 
  background: #fff; 
  color: var(--danger); 
  border: 1.5px solid var(--danger) !important;
  opacity: 0.7;
}
.btn-abs.active { 
  background: var(--danger) !important; 
  color: #fff !important; 
  opacity: 1;
  box-shadow: 0 2px 8px rgba(231, 76, 60, 0.4);
}

</style>
</head>

<body>

<header>
  <img src="banner.jpg" alt="Admin Dashboard Banner" class="header-banner">
</header>
<div class="action-bar">
  <b class="hide-mobile">Admin Dashboard</b>
  <button class="logout" onclick="localStorage.removeItem('loginSession'); window.location.href='login.html'">Logout 🚪</button>
</div>

<div class="container">
  <div class="stats-card">
    💰 Total Collection: ₹<span id="totalAmt">0</span>
  </div>

  <button class="btn-upload" onclick="toggleUpload()">
    📸 Upload Activity Photos
  </button>

  <div id="uploadPanel" style="display:none;">
    <h3 style="margin-top:0;">Select Photos to Upload</h3>
    <input type="file" id="activityPhotos" multiple style="margin-bottom: 10px;"><br>
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <b>Select Students:</b>
      <label style="cursor: pointer; color: var(--primary); font-size: 0.9rem; font-weight: bold;"><input type="checkbox" onchange="toggleAllStudents(this)"> Select All</label>
    </div>
    <div id="studentSelect">Loading students...</div><br>
    
    <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
      <button class="btn-action" style="background: var(--success);" onclick="uploadPhotos()">📤 Upload Now</button>
      <button class="btn-action" style="background: var(--dark);" onclick="bulkPrintCards()">🖨️ Print ID Cards</button>
    </div>
  </div>

  <div>
    <input type="text" id="search" class="search-box" placeholder="Search ID or Name..." onkeyup="renderTable()">
  </div>

  <div class="student-list" id="studentBody">
    <!-- Records will load here -->
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxcCjauNqUeKSHnMZYZC1KW94CKzvC_PYGEugTcUPhMMb8ipEJqSR0g1ZEMLSU5tTEH0g/exec";

let students = [];

// ✅ LOAD DATA FIX
function loadData(){
  fetch(API_URL + "?action=getData")
  .then(res=>res.json())
  .then(data=>{
    students=data;
    renderTable();
    calcTotal();
    loadStudentCheckbox();
  })
  .catch(err=>{
    console.error(err);
    alert("❌ Data Load Error");
  });
}

window.onload=loadData;

function calcTotal(){
  let total=0;
  students.forEach(s=>{
    total += Number(s[11] || 0);
  });
  document.getElementById("totalAmt").innerText = total;
}

function loadStudentCheckbox(){
  const box = document.getElementById("studentSelect");
  box.innerHTML = "";

  students.forEach(s=>{
    box.innerHTML += `
    <label>
      <input type="checkbox" value="${s[0]}"> <b>${s[0]}</b> - ${s[1]}
    </label>`;
  });
}

function renderTable(){
  const tbody=document.getElementById("studentBody");
  const search=document.getElementById("search").value.toLowerCase();
  tbody.innerHTML="";
  let sr=1;

  const today = new Date().toLocaleDateString('en-GB');
  let localAtt = JSON.parse(localStorage.getItem("admin_attendance") || "{}");
  if(localAtt.date !== today) {
    localAtt = { date: today, records: {} };
  }

  students.forEach(s=>{
    if(s[1].toLowerCase().indexOf(search)===-1 && s[0].toLowerCase().indexOf(search)===-1) return;

    let stat = localAtt.records[s[0]];
    let btnPClass = stat === 'Present' ? 'active' : '';
    let btnAClass = stat === 'Absent' ? 'active' : '';

    tbody.innerHTML += `
<div class="student-card">
  <div class="sr-col">
    <div class="sr-label">Sr.</div>
    <div class="sr-num">${sr++}</div>
  </div>
  <div class="prof-col">
    <div class="prof-label">Profile</div>
    <div class="prof-body">
      ${!s[10] ? `<div class="child-photo" style="display:inline-flex;align-items:center;justify-content:center;color:white;font-size:10px;">Photo</div>` : `<img src="${s[10]}" class="child-photo">`}
      <span class="id-box" onclick="openProfile('${s[0]}')">${s[0]}</span>
    </div>
  </div>
  <div class="det-col">
    <div class="det-label">Details & actions</div>
    <div class="det-body">
      <div class="name-box">${s[1]}</div>
      <div class="pay-row">
        <input type="number" id="amt-${s[0]}" class="pay-input" placeholder="Rs" value="${s[11]||''}" style="width: 60px;">
        <select id="mode-${s[0]}" class="pay-input" style="width: 90px;">
          <option value="CASH" ${s[12]==='Cash'||!s[12]?'selected':''}>CASH ^</option>
          <option value="ONLINE" ${s[12]==='Online'?'selected':''}>ONLINE ^</option>
        </select>
        <input type="text" id="utr-${s[0]}" class="pay-input" placeholder="UTR" value="${s[13]||''}" style="width: 100px;">
        <button class="btn btn-save" onclick="savePayment('${s[0]}')">Save</button>
        <button class="btn btn-clear" onclick="clearPayment('${s[0]}')">Clear</button>
      </div>
      <div class="act-row">
        <button id="btnP-${s[0]}" class="btn btn-pres ${btnPClass}" onclick="mark('${s[0]}','${s[1]}','Present',this)">Present</button>
        <button id="btnA-${s[0]}" class="btn btn-abs ${btnAClass}" onclick="mark('${s[0]}','${s[1]}','Absent',this)">Absent</button>
        <button class="btn btn-edit" onclick="editStudent('${s[0]}')">Edit</button>
        <button class="btn btn-del" onclick="deleteStudent('${s[0]}')">Delete</button>
      </div>
    </div>
  </div>
</div>`;
  });
  
  // After local rendering, sync true data from Google Sheets backend
  syncTodayAttendance();
}

function syncTodayAttendance() {
  fetch(URL + "?action=getTodaysAttendance")
  .then(res => res.json())
  .then(data => {
    if(!data || Object.keys(data).length === 0) return;

    const today = new Date().toLocaleDateString('en-GB');
    let localAtt = { date: today, records: data };
    localStorage.setItem("admin_attendance", JSON.stringify(localAtt)); // Update local storage cache
    
    // Update live UI buttons to reflect actual backend state
     for(let id in data) {
        let status = data[id];
        let btnP = document.getElementById("btnP-" + id);
        let btnA = document.getElementById("btnA-" + id);
        if(btnP && btnA) {
           if(status === "Present") {
              btnP.classList.add("active");
              btnA.classList.remove("active");
           } else if(status === "Absent") {
              btnA.classList.add("active");
              btnP.classList.remove("active");
           }
        }
     }
  })
  .catch(err => console.log("Failed to sync attendance from backend.", err));
}

function clearPayment(id){
  document.getElementById("amt-"+id).value="";
  document.getElementById("utr-"+id).value="";
  document.getElementById("mode-"+id).value="Cash";
}

function openProfile(id){
  window.open("parent.html?id="+id+"&view=admin","_blank");
}

function editStudent(id){
  let s = students.find(x=>x[0]==id);

  const fd=new FormData();
  fd.append("action","edit");
  fd.append("id",id);
  fd.append("name",prompt("Name", s[1]));
  fd.append("standard",prompt("Standard", s[4]));
  fd.append("address",prompt("Address", s[5]));

  fetch(API_URL,{method:"POST",body:fd}).then(()=>loadData());
}

function deleteStudent(id){
  if(!confirm("Delete student?")) return;

  const fd=new FormData();
  fd.append("action","delete");
  fd.append("id",id);

  fetch(API_URL,{method:"POST",body:fd}).then(()=>loadData());
}

function mark(id,name,status,btn){
  const today = new Date().toLocaleDateString('en-GB');
  let localAtt = JSON.parse(localStorage.getItem("admin_attendance") || "{}");
  if(localAtt.date !== today) {
    localAtt = { date: today, records: {} };
  }
  localAtt.records[id] = status;
  localStorage.setItem("admin_attendance", JSON.stringify(localAtt));

  const fd=new FormData();
  fd.append("action","attendance");
  fd.append("id",id);
  fd.append("name",name);
  fd.append("status",status);

  fetch(API_URL,{method:"POST",body:fd}).catch(err => console.error(err));

  if(status==="Present"){
    btn.classList.add("active");
    btn.nextElementSibling.classList.remove("active");
  } else {
    btn.classList.add("active");
    btn.previousElementSibling.classList.remove("active");
  }
}

function savePayment(id){
  const fd=new FormData();
  fd.append("action","payment");
  fd.append("id",id);
  fd.append("amount",document.getElementById("amt-"+id).value);
  fd.append("mode",document.getElementById("mode-"+id).value);
  fd.append("utr",document.getElementById("utr-"+id).value);

  fetch(API_URL,{method:"POST",body:fd}).then(()=>loadData());
}

function uploadPhotos(){
  const files=document.getElementById("activityPhotos").files;
  const checkboxes=document.querySelectorAll("#studentSelect input:checked");

  if(files.length===0) return alert("Select photos");

  let ids=[];
  checkboxes.forEach(c=>ids.push(c.value));

  if(ids.length===0) return alert("Select students");

  let arr=[];

  for(let i=0;i<files.length;i++){
    let reader=new FileReader();

    reader.onload=function(e){
      arr.push({name:files[i].name,data:e.target.result});

      if(arr.length===files.length){
        const fd=new FormData();
        fd.append("action","uploadActivityPhotos");
        fd.append("files",JSON.stringify(arr));
        fd.append("studentIds",JSON.stringify(ids));

        fetch(API_URL,{method:"POST",body:fd})
        .then(()=>{
          alert("Uploaded ✅");
          document.getElementById("activityPhotos").value = "";
          checkboxes.forEach(c => c.checked = false);
        });
      }
    };

    reader.readAsDataURL(files[i]);
  }
}

function toggleAllStudents(checkbox) {
  const allBoxes = document.querySelectorAll("#studentSelect input[type='checkbox']");
  allBoxes.forEach(b => b.checked = checkbox.checked);
}

function bulkPrintCards(){
  const checkboxes = document.querySelectorAll("#studentSelect input:checked");
  if(checkboxes.length === 0) return alert("Select at least one student to print ID cards.");

  let ids = [];
  checkboxes.forEach(c => ids.push(c.value));
  
  let cardsHTML = "";
  
  ids.forEach(id => {
    let student = students.find(s => s[0] == id);
    if(student) {
      let photoUrl = student[10] || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
      cardsHTML += `
          <div class="idCard-container">
            <div class="card-header">चिमुकला उत्सव SUMMER CAMP 2026</div>
            <div class="id-body">
              <div class="id-photo-container">
                 <img src="${photoUrl}" class="id-photo">
                 <div class="photo-id-text">ID: <span>${student[0]}</span></div>
              </div>
              <div class="id-details">
                <div class="id-details-row"><label>Name</label><span class="cardName">${student[1]}</span></div>
                <div class="id-details-row"><label>Mobile</label><span>${student[7]}</span></div>
                <div class="id-details-row"><label>Address</label><span>${student[5]}</span></div>
              </div>
            </div>
            <div class="id-footer">Summer Camp 2026 Official ID Card</div>
          </div>
      `;
    }
  });

  const w = window.open("");
  w.document.write(`
    <html>
      <head>
        <title>Bulk Print ID Cards</title>
        <style>
          @media print {
            @page { size: A4 portrait; margin: 12mm; }
            body { margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; background: transparent; }
          }
          body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; background: #eee; padding: 20px; display: flex; justify-content: center;
          }
          .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 336px); 
            gap: 15px; 
            justify-content: center;
            background: #fff;
            padding: 10px;
          }
          
          .idCard-container {
            display: block !important;
            width: 336px !important;
            height: 216px !important; 
            box-sizing: border-box;
            border-radius: 8px;
            background-color: #fef9e7;
            position: relative;
            overflow: hidden;
            border: 1px solid #e67e22;
            page-break-inside: avoid;
            break-inside: avoid;
          }
          .idCard-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('logo.jpg');
            background-size: 60%;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: 1;
          }
          .card-header, .id-body, .id-footer { position: relative; z-index: 2; }
          .card-header { 
            background: #e67e22;
            color: white;
            text-align: center; 
            font-weight: bold; 
            font-size: 15px; 
            padding: 4px 5px;
            margin-bottom: 8px;
            border-bottom: 2px solid #d35400;
          }
          .id-body { 
            display: flex; gap: 12px; align-items: flex-start; padding: 0 12px;
          }
          .id-photo-container { text-align: center; width: 75px; }
          .id-photo { 
            width: 75px; height: 90px; border-radius: 6px; object-fit: cover; border: 2px solid #e67e22; background: #fff;
          }
          .photo-id-text { font-size: 11px; font-weight: 900; color: #d35400; margin-top: 4px; background: rgba(255,255,255,0.8); border-radius: 4px; padding: 2px 0; }
          .id-details { flex: 1; width: 100%; text-align: left; }
          .id-details-row { margin-bottom: 5px; line-height: 1.2; }
          .id-details-row label { display: block; font-size: 9px; color: #e67e22; text-transform: uppercase; font-weight: bold; margin-bottom: 1px; }
          .id-details-row span { display: block; font-size: 13px; color: #1a3c5a; font-weight: bold; word-break: break-word; }
          .cardName { font-size: 16px !important; font-weight: 900 !important; color: #0b223d !important; letter-spacing: 0.5px; margin-bottom: 3px; }
          .id-footer { background: #1a3c5a; text-align: center; padding: 4px; font-size: 10px; color: #fff; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; font-weight: bold; letter-spacing: 0.5px; }
        </style>
      </head>
      <body>
        <div class="cards-grid">
           ` + cardsHTML + `
        </div>
      </body>
    </html>`);
  w.document.close();
  setTimeout(() => { w.focus(); w.print(); }, 1200);
}

function toggleUpload(){
