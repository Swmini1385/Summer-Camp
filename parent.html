<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parent Dashboard - Summer Camp 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f48024;
      --primary-dark: #d35400;
      --secondary: #6ab04c;
      --dark: #2c3e50;
      --bg: #fdf8e4;
      --card-bg: #ffffff;
      --text: #333333;
      --border: #f1ebd8;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    body { 
      font-family: 'Outfit', sans-serif; 
      margin: 0; 
      background: var(--bg); 
      color: var(--text); 
    }
    
    header { 
      background: var(--card-bg); 
      padding: 0; 
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 3px solid var(--primary);
      display: flex;
      align-items: center;
    }
    
    .header-banner {
      width: 100%;
      height: auto;
      display: block;
    }

    .logout-btn { 
      background: #e74c3c; 
      color: white; 
      padding: 6px 16px; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
      font-weight: 600;
      font-size: 0.95rem; 
      font-family: inherit;
      transition: all 0.3s ease;
      box-shadow: 0 2px 6px rgba(231, 76, 60, 0.2);
    }

    .logout-btn:hover { 
      background: #c0392b; 
      transform: translateY(-2px); 
      box-shadow: 0 4px 10px rgba(231, 76, 60, 0.4); 
    }

    .action-bar {
      display: flex;
      justify-content: flex-end;
      padding: 15px 20px 0 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    
    .container { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .row { display: flex; gap: 20px; flex-wrap: wrap; }
    .col { flex: 1; min-width: 320px; }
    
    .card { 
      background: var(--card-bg); 
      padding: 25px; 
      border-radius: 16px; 
      margin-bottom: 20px; 
      box-shadow: var(--shadow); 
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .card h3 { 
      margin-top: 0; 
      color: var(--primary); 
      font-size: 1.4rem; 
      border-bottom: 2px solid var(--border); 
      padding-bottom: 10px; 
      margin-bottom: 20px;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    img#photo { 
      width: 120px; 
      height: 120px; 
      border-radius: 50%; 
      object-fit: cover; 
      background: #eee; 
      border: 4px solid var(--primary); 
      box-shadow: 0 4px 10px rgba(244, 128, 36, 0.3);
      margin-bottom: 15px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      width: 100%;
      text-align: left;
      margin-top: 15px;
      background: #fafafa;
      padding: 15px;
      border-radius: 10px;
      border: 1px dashed #ccc;
    }
    
    .info-grid p { margin: 0; font-size: 1rem; color: var(--dark); }
    .info-grid b { color: #555; display: block; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-grid span { font-weight: 600; color: #222; font-size: 1.1rem; }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-top: 15px;
      font-family: inherit;
      box-sizing: border-box;
    }

    button { 
      padding: 12px 20px; 
      background: var(--secondary); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      margin-top: 15px; 
      cursor: pointer; 
      font-weight: 600; 
      font-family: inherit;
      transition: all 0.3s;
      width: 100%;
      font-size: 1rem;
    }
    
    button:hover { background: #509e35; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(106, 176, 76, 0.3); }
    
    /* ID Card Styling */
    /* ID Card Styling */
    #idCard {
      display: none;
      width: 336px; /* 3.5 inches at 96 PPI */
      height: 216px; /* 2.25 inches at 96 PPI */
      box-sizing: border-box;
      border-radius: 8px;
      margin-top: 20px;
      background-color: #fef9e7; /* Light cream from logo */
      position: relative;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      border: 1px solid #f39c12; /* Logo orange border */
    }

    #idCard::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url('logo.jpg');
      background-size: 60%;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.15;
      z-index: 1;
    }

    .card-header, .id-body, .id-footer {
       position: relative;
       z-index: 2;
    }

    .card-header { 
      background: linear-gradient(135deg, #f39c12, #e67e22);
      color: white;
      text-align: center; 
      font-weight: bold; 
      font-family: 'Baloo 2', sans-serif; 
      font-size: 15px; 
      padding: 4px 5px;
      margin-bottom: 8px; 
      letter-spacing: 0.5px;
      border-bottom: 2px solid #d35400;
    }
    
    .id-body { 
      display: flex; 
      gap: 12px; 
      align-items: flex-start;
      padding: 0 12px;
    }
    
    .id-photo-container {
      flex: 0 0 auto;
      text-align: center;
      width: 75px;
    }
    
    .id-photo { 
      width: 75px; 
      height: 90px; 
      border-radius: 6px; 
      object-fit: cover; 
      border: 2px solid #e67e22; 
      background: #fff;
    }
    
    .photo-id-text {
      font-size: 11px;
      font-weight: 800;
      color: #d35400;
      margin-top: 4px;
      background: rgba(255,255,255,0.8);
      border-radius: 4px;
      padding: 2px 0;
    }

    .id-details {
      flex: 1;
      width: 100%;
    }
    
    .id-details-row {
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .id-details-row label {
      display: block;
      font-size: 9px;
      color: #d35400;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 1px;
    }
    
    .id-details-row span {
      display: block;
      font-size: 13px;
      color: #1a3c5a; /* Dark blue from logo text */
      font-weight: 700;
      word-break: break-word;
    }

    #cardName {
      font-size: 16px;
      font-weight: 900;
      color: #0b223d; /* Even darker blue for extreme bold look */
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }

    .id-footer {
      background: #1a3c5a; /* Blue footer */
      text-align: center;
      padding: 4px;
      font-size: 10px;
      color: #fff;
      border-top: 2px solid #0b223d;
      position: absolute;
      bottom: 0;
      width: 100%;
      box-sizing: border-box;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    
    /* 📸 PHOTO ALBUM STYLING */
    .album-date-header { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-top: 25px; border-bottom: 2px solid var(--border); padding-bottom: 8px; display: inline-block; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
    .photo-item { position: relative; border-radius: 10px; overflow: hidden; height: 140px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
    .photo-item:hover { transform: scale(1.05); z-index: 2; box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
    .download-btn { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); color: white; padding: 4px 8px; border-radius: 5px; font-size: 12px; text-decoration: none; backdrop-filter: blur(5px); transition: 0.2s; }
    .download-btn:hover { background: var(--primary); }

    /* Table Design */
    .table-container { overflow-x: auto; margin-top: 15px; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #f8f9fa; color: var(--dark); font-weight: 600; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 0.5px; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #fdfdfd; }

    .attendance-stats {
      display: flex; gap: 20px; margin-bottom: 15px;
    }
    .att-stat {
      background: #f1f2f6; padding: 15px 20px; border-radius: 10px; flex: 1; text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--dark);
    }
    .att-stat.present span { color: var(--secondary); font-size: 1.8rem; display: block; }
    .att-stat.absent span { color: #e74c3c; font-size: 1.8rem; display: block; }

  </style>
</head>

<body>

<header>
  <img src="banner.jpg" alt="Parent Dashboard Banner" class="header-banner">
</header>

<div class="action-bar">
  <button class="logout-btn" onclick="logout()">Logout 🚪</button>
</div>

<div class="container">
  <div class="row">
    <div class="col">
      <div class="card">
        <h3>👤 Student Profile</h3>
        <div class="profile-info">
          <img id="photo">
          <input type="file" id="newPhoto" accept="image/*">
          <button onclick="updatePhoto()" style="background: var(--dark); color: white; width: auto;">📸 Update Profile Photo</button>
        </div>

        <div class="info-grid">
          <p><b>StudentID</b> <span id="id"></span></p>
          <p><b>Name</b> <span id="name"></span></p>
          <p style="grid-column: span 2;"><b>Standard</b> <span id="std"></span></p>
        </div>
      </div>
    </div>

    <div class="col">
      <div class="card">
        <h3>💳 Payment & ID details</h3>
        
        <div class="info-grid" style="margin-top: 0; margin-bottom: 20px;">
          <p><b>Amount</b> ₹<span id="amt"></span></p>
          <p><b>Mode</b> <span id="mode"></span></p>
          <p style="grid-column: span 2;"><b>UTR</b> <span id="utr"></span></p>
        </div>

        <div style="display: flex; gap: 10px;">
          <button onclick="toggleCard()">🪪 Show ID Card</button>
          <button onclick="printCard()" style="background: var(--dark);">🖨 Print ID</button>
        </div>

        <div id="idCard">
          <div class="card-header">चिमुकला उत्सव SUMMER CAMP 2026</div>
          <div class="id-body">
            <div class="id-photo-container">
               <img id="cardPhoto" class="id-photo">
               <div class="photo-id-text">ID: <span id="cardId"></span></div>
            </div>
            <div class="id-details">
              <div class="id-details-row"><label>Name</label><span id="cardName"></span></div>
              <div class="id-details-row"><label>Mobile</label><span id="cardMobile"></span></div>
              <div class="id-details-row"><label>Address</label><span id="cardAddress"></span></div>
            </div>
          </div>
          <div class="id-footer">Summer Camp 2026 Official ID Card</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h3>📊 Attendance Record</h3>
    <div class="attendance-stats">
      <div class="att-stat present">Present <span id="presentCount">0</span></div>
      <div class="att-stat absent">Absent <span id="absentCount">0</span></div>
    </div>
    
    <div class="table-container">
      <table id="attTable">
        <tr><th>Date</th><th>Status</th></tr>
      </table>
    </div>
  </div>

  <div class="card">
    <h3>📸 Student's Activity Album</h3>
    <div id="photoAlbum">
       <p style="color: #666; font-style: italic;">Loading photos...</p>
    </div>
  </div>
</div>

<script>
  const URL = "https://script.google.com/macros/s/AKfycbxcCjauNqUeKSHnMZYZC1KW94CKzvC_PYGEugTcUPhMMb8ipEJqSR0g1ZEMLSU5tTEH0g/exec";
// २. URL आता config.js मधून येईल
const params = new URLSearchParams(window.location.search);
const studentId = params.get("id");
const isAdminView = params.get("view") === "admin";

if (!studentId) {
  alert("Login Required!");
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem('loginSession');
  window.location.href = "login.html";
}

// 👉 LOAD PROFILE
fetch(URL + "?action=getData")
.then(res => res.json())
.then(data => {
  let student = data.find(r => r[0].toString().trim() === studentId.toString().trim());
  if(!student) return;

  document.getElementById("id").innerText = student[0];
  document.getElementById("name").innerText = student[1];
  document.getElementById("std").innerText = student[4];
  document.getElementById("photo").src = student[10] || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
  document.getElementById("amt").innerText = student[11] || "0";
  document.getElementById("mode").innerText = student[12] || "-";
  document.getElementById("utr").innerText = student[13] || "-";
  document.getElementById("cardPhoto").src = student[10] || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
  document.getElementById("cardName").innerText = student[1];
  document.getElementById("cardId").innerText = student[0];
  document.getElementById("cardAddress").innerText = student[5];
  document.getElementById("cardMobile").innerText = student[7];
  
  // प्रोफाइल लोड झाल्यावर फोटो अल्बम लोड करा
  loadPhotos();
});

// 👉 LOAD ATTENDANCE
fetch(URL + "?action=getAllAttendance&id=" + studentId)
.then(res => res.json())
.then(data => {
  let p = 0, a = 0;
  const table = document.getElementById("attTable");
  data.forEach(row => {
    let date = new Date(row[2]).toLocaleDateString('en-GB');
    let status = row[3];
    if(status === "Present") p++; else a++;
    let color = (status === "Present") ? "var(--secondary)" : "#e74c3c";
    let icon = (status === "Present") ? "✅" : "❌";
    table.innerHTML += `<tr><td>${date}</td><td style="color:${color}; font-weight:bold;">${icon} ${status}</td></tr>`;
  });
  document.getElementById("presentCount").innerText = p;
  document.getElementById("absentCount").innerText = a;
});

// 👉 LOAD DATE-WISE PHOTOS
function loadPhotos() {
  const album = document.getElementById("photoAlbum");
  fetch(URL + "?action=getStudentPhotos&id=" + studentId)
  .then(res => res.json())
  .then(data => {
    album.innerHTML = "";
    if (Object.keys(data).length === 0) {
      album.innerHTML = "<p>No activity photos uploaded yet.</p>";
      return;
    }

    for (let date in data) {
      album.innerHTML += `<div class="album-date-header">📅 ${date}</div>`;
      let grid = `<div class="photo-grid">`;
      data[date].forEach(img => {
        let adminOverlay = isAdminView ? `<input type="checkbox" class="delete-checkbox" value="${img.url}" style="position:absolute; top:10px; left:10px; z-index:10; transform:scale(1.8); cursor:pointer;">` : ``;
        grid += `
          <div class="photo-item">
            ${adminOverlay}
            <img src="${img.url}" onclick="window.open('${img.url}')">
            <a href="${img.url}" download="activity.jpg" class="download-btn">💾 Save</a>
          </div>`;
      });
      grid += `</div>`;
      album.innerHTML += grid;
    }
    
    if (isAdminView && Object.keys(data).length > 0) {
      album.innerHTML = `<button onclick="deleteSelectedAlbumPhotos()" style="background:var(--danger); width:auto; margin-bottom:15px; box-shadow:0 4px 10px rgba(231,76,60,0.3);">🗑️ Delete Selected Photos</button>` + album.innerHTML;
    }
  });
}

function deleteSelectedAlbumPhotos() {
  const checkboxes = document.querySelectorAll(".delete-checkbox:checked");
  if(checkboxes.length === 0) return alert("Select at least one photo to delete. (Tick the checkboxes on the photos)");
  if(!confirm("Are you sure you want to delete these photos?\n\n(Note: Google Apps Script must support 'deleteSpecificPhotos'!)")) return;
  
  let urls = [];
  checkboxes.forEach(c => urls.push(c.value));
  
  let btn = document.querySelector("button[onclick='deleteSelectedAlbumPhotos()']");
  btn.innerText = "Deleting... ⏳";
  
  const fd = new FormData();
  fd.append("action", "deleteSpecificPhotos");
  fd.append("id", studentId);
  fd.append("urls", JSON.stringify(urls));
  
  fetch(URL, {method: "POST", body: fd})
  .then(() => {
    alert("Delete request sent successfully! ✅");
    checkboxes.forEach(c => {
      let photoItem = c.closest(".photo-item");
      if(photoItem) photoItem.remove();
    });
    btn.innerText = "🗑️ Delete Selected Photos";
  })
  .catch(e => console.error(e));
}


function updatePhoto(){
  const file = document.getElementById("newPhoto").files[0];
  if(!file) return alert("Please select a photo first");
  const reader = new FileReader();
  reader.onload = function(e){
    const fd = new FormData();
    fd.append("action","updatePhoto");
    fd.append("id", studentId);
    fd.append("photo", e.target.result);
    fetch(URL, {method:"POST", body:fd}).then(() => location.reload());
  };
  reader.readAsDataURL(file);
}

function toggleCard(){
  const c = document.getElementById("idCard");
  if (c.style.display === "block" || c.style.display === "inline-block") {
    c.style.display = "none";
  } else {
    c.style.display = "block";
  }
}

function printCard(){
  const content = document.getElementById("idCard").outerHTML;
  const w = window.open("");
  w.document.write(`
    <html>
      <head>
        <title>Print ID Card</title>
        <style>
          @media print {
            @page { size: 3.5in 2.25in; margin: 0; }
            body { margin: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
          }
          body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #fff;}
          
          #idCard {
            display: block !important;
            width: 3.5in !important;
            height: 2.25in !important;
            box-sizing: border-box;
            border-radius: 8px;
            background-color: #fef9e7;
            position: relative;
            overflow: hidden;
            border: 1px solid #e67e22;
          }
          #idCard::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('logo.jpg');
            background-size: 60%;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: 1;
          }
          .card-header, .id-body, .id-footer { position: relative; z-index: 2; }
          .card-header { 
            background: #e67e22;
            color: white;
            text-align: center; 
            font-weight: bold; 
            font-size: 15px; 
            padding: 4px 5px;
            margin-bottom: 8px;
            border-bottom: 2px solid #d35400;
          }
          .id-body { 
            display: flex; gap: 12px; align-items: flex-start; padding: 0 12px;
          }
          .id-photo-container { text-align: center; width: 75px; }
          .id-photo { 
            width: 75px; height: 90px; border-radius: 6px; object-fit: cover; border: 2px solid #e67e22; background: #fff;
          }
          .photo-id-text { font-size: 11px; font-weight: 900; color: #d35400; margin-top: 4px; }
          .id-details { flex: 1; width: 100%; text-align: left; }
          .id-details-row { margin-bottom: 5px; line-height: 1.2; }
          .id-details-row label { display: block; font-size: 9px; color: #e67e22; text-transform: uppercase; font-weight: bold; margin-bottom: 1px; }
          .id-details-row span { display: block; font-size: 13px; color: #1a3c5a; font-weight: bold; word-break: break-word; }
          #cardName { font-size: 16px; font-weight: 900; color: #0b223d; letter-spacing: 0.5px; margin-bottom: 3px; }
          .id-footer { background: #1a3c5a; text-align: center; padding: 4px; font-size: 10px; color: #fff; position: absolute; bottom: 0; width: 100%; box-sizing: border-box; font-weight: bold; }
        </style>
      </head>
      <body>
        ` + content + `
      </body>
    </html>`);
  w.document.close();
  setTimeout(() => { w.focus(); w.print(); }, 800);
}
</script>
</body>
</html>
